services:
  app:
    build: .
    container_name: simple-finance-app
    expose:
      - "3000"
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: finance_user
      DB_PASSWORD: finance_pass
      DB_NAME: simple_finance
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: simple-finance-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
