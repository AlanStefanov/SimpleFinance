services:
  mysql:
    image: mysql:8.0
    container_name: simple-finance-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: simple_finance
      MYSQL_USER: finance_user
      MYSQL_PASSWORD: finance_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./server/schema-migration.sql:/docker-entrypoint-initdb.d/02-schema-migration.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: simple-finance-app
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: finance_user
      DB_PASSWORD: finance_pass
      DB_NAME: simple_finance
      JWT_SECRET: Dr@wssap1234k-super-secure-key-2026
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
